<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Initiatives List — GDB</title>
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/initiative.css">
</head>
<body>

<div id="gdb-error"></div>
<div id="gdb-loading"><div class="gdb-spinner"></div><div class="gdb-loading-text">Loading…</div></div>

<div id="init-content" class="gdb-page" style="display:none">
<!-- Initiatives List Tab -->
  <div class="filter-bar" style="margin-top:16px">
    <span class="fb-label">Roadmap year:</span>
    <div id="yf-list" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    <div class="fb-sep"></div>
    <span class="fb-label">Assignee:</span>
    <select class="list-filter-select" id="af-list-select" onchange="onAssigneeChange(this.value)">
      <option value="all">All assignees</option>
    </select>
  </div>
  <div style="font-size:11px;color:#aaa;margin-bottom:10px" id="list-count"></div>
  <table class="dt" id="list-table" style="font-size:11.5px">
    <thead>
      <tr>
        <th style="width:72px">Key</th>
        <th>Summary</th>
        <th style="width:90px">Status</th>
        <th style="width:90px">Roadmap</th>
        <th style="width:110px">Project goal</th>
        <th style="width:70px">Type</th>
        <th style="width:110px">Assignee</th>
        <th style="width:110px">Assignee 2nd</th>
        <th style="width:100px">Monitor</th>
        <th style="width:110px">Target start</th>
        <th style="width:110px">Target end</th>
      </tr>
    </thead>
    <tbody id="list-body"></tbody>
  </table>
</div>

<!-- Placeholder for data.js timestamp display -->
<span id="refresh-time" style="display:none"></span>
<span id="current-dt" style="display:none"></span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/header.js"></script>
<script src="../js/render.js"></script>
<script src="../js/data.js"></script>
<script>
/* Set callback BEFORE loadData() runs */
window.onDataReady = function(data) {
  document.getElementById('gdb-loading').style.display = 'none';
  document.getElementById('init-content').style.display = 'block';
  renderList();
  if(typeof onAssigneeChange==="function")onAssigneeChange();
  /* Update header time from data.js refresh-time span */
  var rtEl = document.getElementById('refresh-time');
  if (rtEl && typeof setGdbUpdateTime === 'function') {
    setGdbUpdateTime(new Date().toISOString());
  }
};

window.addEventListener('DOMContentLoaded', function() {
  buildGdbHeader({ showRefresh: true });
  gdbAuthGuard(function(user) {
    /* loadData() is async and calls renderAll() + window.onDataReady() when done */
    loadData();
  });
  /* Wire refresh button to reload data */
  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'gdb-refresh-btn') {
      document.getElementById('gdb-loading').style.display = 'flex';
      document.getElementById('init-content').style.display = 'none';
      loadData();
    }
  });
});
</script>
</body>
</html>
