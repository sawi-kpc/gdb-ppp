<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Initiatives Timeline — GDB</title>
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/initiative.css">
</head>
<body class="has-init-subnav">

<div id="gdb-error"></div>
<div id="gdb-loading"><div class="gdb-spinner"></div><div class="gdb-loading-text">Loading…</div></div>

<div id="init-content" class="gdb-page" style="display:none">
<div class="filter-bar" style="margin-top:16px">
    <span class="fb-label">Roadmap year:</span>
    <div id="yf-sum" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="metrics-strip" id="sum-metrics"></div>
  <div class="section">
    <div class="sec-title">Initiative timeline</div>
    <div class="tl-ctrl-row">
      <span class="tl-ctrl-label">Focus:</span>
      <select class="tl-ctrl-select" id="tl-start" onchange="renderSummary()"></select>
      <span style="font-size:11px;color:#aaa">to</span>
      <select class="tl-ctrl-select" id="tl-end" onchange="renderSummary()"></select>
      <div class="fb-sep"></div>
      <span class="tl-ctrl-label">Stage:</span>
      <div id="sum-stage-filter" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <div class="fb-sep"></div>
      <button class="fb-btn" id="btn-hide-nodate" onclick="toggleHideNoDate(this)">Hide no-date items</button>
      <div class="fb-sep"></div>
      
    </div>
    <div class="tl-container"><div class="tl-inner" id="tl-inner"></div></div>
  </div>
</div>

<!-- TAB 1 INITIATIVES -->
</div>

<!-- Placeholder for data.js timestamp display -->
<span id="refresh-time" style="display:none"></span>
<span id="current-dt" style="display:none"></span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/header.js"></script>
<script src="../js/render.js"></script>
<script src="../js/data.js"></script>
<script>
/* Set callback BEFORE loadData() runs */
window.onDataReady = function(data) {
  document.getElementById('gdb-loading').style.display = 'none';
  document.getElementById('init-content').style.display = 'block';
  renderSummary();
  
  /* Update header time from data.js refresh-time span */
  var rtEl = document.getElementById('refresh-time');
  if (rtEl && typeof setGdbUpdateTime === 'function') {
    setGdbUpdateTime(new Date().toISOString());
  }
};

window.addEventListener('DOMContentLoaded', function() {
  buildGdbHeader({ showRefresh: true });
  buildGdbInitiativeSubNav();
  gdbAuthGuard(function(user) {
    /* loadData() is async and calls renderAll() + window.onDataReady() when done */
    loadData();
  });
  /* Wire refresh button to reload data */
  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'gdb-refresh-btn') {
      document.getElementById('gdb-loading').style.display = 'flex';
      document.getElementById('init-content').style.display = 'none';
      loadData();
    }
  });
});
</script>
</body>
</html>
