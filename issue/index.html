<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Issues — GDB Dashboard</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
/* ═══════════════════════════════════════════
   Issue page styles
═══════════════════════════════════════════ */

/* ── Page layout ── */
.issue-content { padding: 20px 24px; max-width: 1600px; margin: 0 auto; min-width: 0; overflow: hidden; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; min-width: 0; }
.panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.panel-title { font-size: 14px; font-weight: 700; color: var(--text); }
.panel-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }
.panel-body  { padding: 16px 18px; min-width: 0; overflow: hidden; }

/* ── Control bar ── */
.ctrl-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.status-btn { padding: 4px 13px; font-size: 11px; font-weight: 600; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all .15s; }
.status-btn.active, .status-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.ctrl-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
.ctrl-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 11px; outline: none; cursor: pointer; }
.ctrl-select:focus { border-color: var(--accent); }
.ctrl-search input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px 5px 28px; font-size: 12px; width: 200px; outline: none; }
.ctrl-search input:focus { border-color: var(--accent); }
.ctrl-search { position: relative; }
.ctrl-search::before { content: '⌕'; position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
.view-btn { padding: 4px 12px; font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all .15s; }
.view-btn.active { background: var(--surface); color: var(--text); border-color: var(--text3); }
.count-label { font-size: 11px; color: var(--text3); margin-left: auto; }

/* ── Status tags ── */
.stag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.stag.open          { background: rgba(226,75,74,.12);  color: #A32D2D; border: 1px solid rgba(226,75,74,.2); }
.stag.investigating { background: rgba(239,159,39,.12); color: #854F0B; border: 1px solid rgba(239,159,39,.2); }
.stag.in-progress   { background: rgba(55,138,221,.12); color: #185FA5; border: 1px solid rgba(55,138,221,.2); }
.stag.resolved      { background: rgba(29,158,117,.12); color: #0F6E56; border: 1px solid rgba(29,158,117,.2); }
.stag.done          { background: rgba(63,185,80,.10);  color: #27500A; border: 1px solid rgba(63,185,80,.2); }

/* ── Tag badges ── */
.tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
.tag.multi-ch      { background: rgba(226,75,74,.08); color: var(--down); border: 1px solid rgba(226,75,74,.15); }
.tag.overdue-tag   { background: rgba(226,75,74,.12); color: #A32D2D; border: 1px solid rgba(226,75,74,.2); }
.tag.unassigned-tag{ background: rgba(226,75,74,.08); color: var(--down); border: 1px solid rgba(226,75,74,.15); }

/* ── Board layout ── */
.iboard-wrap { overflow-x: auto; width: 100%; }
.iboard { display: flex; gap: 10px; align-items: start; width: 100%; min-width: 0; }
.iboard-col { display: flex; flex-direction: column; gap: 8px; min-width: 0; overflow: hidden; flex: 1; }
.iboard-col--hidden { flex: 0 0 44px !important; min-width: 44px; max-width: 44px; }
.iboard-col--hidden .iboard-col-hd { flex-direction: column; height: auto; min-height: 160px; justify-content: flex-start; align-items: center; padding: 10px 4px 8px; gap: 6px; border-radius: 6px; cursor: pointer; }
.iboard-col--hidden .iboard-col-name { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 11px; font-weight: 700; color: var(--text); white-space: normal; overflow: visible; text-overflow: unset; text-align: center; max-width: 32px; }
.iboard-col-hd { display: flex; align-items: center; gap: 6px; padding: 7px 10px; background: var(--surface2); border-radius: 6px; border-top: 3px solid; margin-bottom: 2px; }
.iboard-col-name { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.iboard-col-cnt  { flex-shrink: 0; font-size: 11px; font-weight: 700; color: var(--text2); background: var(--surface); padding: 1px 7px; border-radius: 10px; border: 1px solid var(--border); }
.iboard-col-eye { background: none; border: none; cursor: pointer; color: var(--text3); display: flex; align-items: center; padding: 2px; border-radius: 3px; flex-shrink: 0; }
.iboard-col-eye:hover { color: var(--text); background: var(--border); }

/* ── Issue card ── */
.icard { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; position: relative; overflow: hidden; transition: border-color .15s; min-width: 0; width: 100%; box-sizing: border-box; }
.icard:hover { border-color: var(--text3); }
.icard::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 0; }
.icard.open::before          { background: var(--down); }
.icard.investigating::before { background: var(--amber); }
.icard.in-progress::before   { background: var(--accent); }
.icard.resolved::before      { background: var(--teal); }
.icard.done::before          { background: var(--up); }

.icard-top { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; min-width: 0; }
.ikey { font-size: 11px; font-weight: 700; flex-shrink: 0; }
.ikey a { color: var(--accent); text-decoration: none; }
.ikey a:hover { text-decoration: underline; }
.isummary { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4; word-break: break-word; overflow-wrap: break-word; }

/* ── Meta row (1-line: severity · comp · assignee · due) ── */
.icard-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; min-width: 0; }
.sev-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
.sev-badge.critical { background: rgba(226,75,74,.12); color: #A32D2D; border: 1px solid rgba(226,75,74,.2); }
.sev-badge.high     { background: rgba(249,115,22,.12); color: #7c3d12; border: 1px solid rgba(249,115,22,.2); }
.sev-badge.moderate { background: rgba(239,159,39,.12); color: #854F0B; border: 1px solid rgba(239,159,39,.2); }
.sev-badge.low      { background: rgba(63,185,80,.10);  color: #27500A; border: 1px solid rgba(63,185,80,.2); }
.meta-sep    { color: var(--text3); font-size: 10px; line-height: 1; flex-shrink: 0; }
.comp-chip   { font-size: 10px; padding: 2px 7px; border-radius: 3px; background: rgba(55,138,221,.1); color: #185FA5; border: 1px solid rgba(55,138,221,.2); white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; }
.meta-assignee { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1 1 60px; max-width: 140px; }
.meta-due        { font-size: 11px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
.meta-due.overdue { color: var(--down); }

/* ── Timeline 2-bar ── */
.tl2 { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); min-width: 0; overflow: hidden; }
/* bar */
.tl2-bar-outer { position: relative; margin-bottom: 6px; }
.tl2-bar { display: flex; height: 9px; border-radius: 3px; overflow: visible; width: 100%; }
.tl2-seg-grey  { background: #555; flex-shrink: 0; min-width: 8px; border-radius: 3px 0 0 3px; overflow: hidden; }
.tl2-seg-green { background: var(--up); flex: 1; border-radius: 0 3px 3px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.tl2-seg-fix   { flex: 1; border-radius: 0 3px 3px 0; overflow: hidden; }
/* .tl2-bar-label removed */
/* due-date marker — label ABOVE bar, line through bar */
.tl2-due-marker-top { position: absolute; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; bottom: 0; }
.tl2-due-label-top  { font-size: 8px; color: var(--text2); white-space: nowrap; background: var(--surface); padding: 1px 5px; border-radius: 3px; border: 1px solid var(--border); line-height: 1.4; }
.tl2-due-tick       { width: 1.5px; height: 4px; background: rgba(255,255,255,.6); }
.tl2-due-line-wrap  { position: absolute; top: 0; bottom: 0; width: 1.5px; background: rgba(255,255,255,.7); transform: translateX(-50%); pointer-events: none; border-radius: 1px; }
/* dots row */
.tl2-dots-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; min-width: 0; overflow: hidden; }
.tl2-dot-wrap { display: flex; align-items: flex-start; gap: 3px; min-width: 0; flex: 1; }
.tl2-dot  { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
.tl2-ts-wrap  { display: flex; flex-direction: column; min-width: 0; }
.tl2-ts-date  { font-size: 9px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.tl2-ts-time  { font-size: 8px; color: var(--text3); white-space: nowrap; }
.tl2-pending  { font-size: 8px; color: var(--amber); margin-top: 2px; }
/* metrics row */
.tl2-metrics-row { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; overflow: hidden; }
.tl2-divider { color: var(--border); font-size: 9px; flex-shrink: 0; }
.tl2-metric  { font-size: 9px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
.tl2-metric b { font-weight: 700; }
.tl2-fix  { color: var(--amber); }

/* ── Priority badge top-right of card ── */
.icard-pri { margin-left: auto; flex-shrink: 0; }
.pri-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; white-space: nowrap; }
.pri-badge.pri-highest { color: var(--down); }
.pri-badge.pri-high    { color: #f97316; }
.pri-badge.pri-medium  { color: var(--amber); }
.pri-badge.pri-low     { color: var(--up); }
.pri-badge.pri-lowest  { color: var(--text3); }

/* ── Table warning row ── */
.tbl-warn { font-size: 10px; color: var(--down); font-weight: 600; margin-top: 2px; white-space: nowrap; }

/* ── Overdue warning (replaces init-hint on cards) ── */
.overdue-warn { display: flex; align-items: flex-start; gap: 7px; margin-top: 8px; padding: 7px 10px; background: rgba(226,75,74,.08); border-radius: 5px; border: 1px solid rgba(226,75,74,.2); }
.overdue-warn .ow-icon { color: var(--down); font-weight: 700; font-size: 12px; margin-top: 1px; flex-shrink: 0; }
.ow-body { font-size: 11px; color: #A32D2D; line-height: 1.5; }

/* ── Table view ── */
.tbl-scroll { overflow-x: auto; }
.itbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.itbl th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text2); white-space: nowrap; cursor: pointer; user-select: none; }
.itbl td { text-align: left; }
.itbl th:hover { color: var(--text); }
.itbl td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.itbl tr:hover td { background: var(--surface2); }
.itbl .empty { text-align: center; padding: 40px; color: var(--text3); }
.comp-chips-wrap { display: flex; flex-wrap: wrap; gap: 4px; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; }

/* ── Vertical bar chart ── */
.chart-head    { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.chart-toggle  { display: flex; gap: 4px; flex-shrink: 0; }
.ctog { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; transition: all .15s; }
.ctog.active, .ctog:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

/* chart area with y-axis */
.vbar-area     { display: flex; align-items: flex-end; gap: 6px; margin: 8px 0 4px; height: 150px; }
.vbar-y-axis   { display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; width: 28px; flex-shrink: 0; padding-bottom: 0; }
.vbar-y-tick   { font-size: 9px; color: var(--text3); line-height: 1; }
.vbar-inner    { position: relative; flex: 1; display: flex; flex-direction: column; min-width: 0; justify-content: flex-end; }
.vbar-grid     { position: absolute; inset: 0; bottom: 20px; pointer-events: none; }
.vbar-hline    { position: absolute; left: 0; right: 0; height: 1px; background: var(--border); opacity: .5; }
.vbar-bars     { display: flex; align-items: flex-end; gap: 16px; height: 100%; padding: 0 12px; flex: 1; overflow-x: auto; justify-content: center; }

/* individual bar column */
.vbar-col      { display: flex; flex-direction: column; align-items: center; flex: 0 1 72px; min-width: 40px; max-width: 100px; height: 100%; }
.vbar-stack    { display: flex; flex-direction: column; justify-content: flex-end; width: 100%; flex: 1; border-radius: 3px 3px 0 0; overflow: hidden; gap: 1px; }
.vbar-seg      { width: 100%; flex-shrink: 0; transition: height .35s ease; }
.vbar-x-label  { font-size: 9px; color: var(--text3); white-space: nowrap; margin-top: 4px; text-align: center; height: 16px; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

.chart-legend  { display: flex; gap: 12px; margin-top: 6px; }
.cleg          { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text2); }
.cleg-dot      { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── Heatmap chart ── */
.hm-wrap  { overflow-x: auto; margin: 8px 0; width: 100%; }
.hm-table { border-collapse: separate; border-spacing: 3px; font-size: 10px; width: 100%; table-layout: auto; }
.hm-corner { min-width: 110px; }
.hm-th    { font-size: 10px; font-weight: 600; color: var(--text2); padding: 4px 6px; text-align: center; white-space: nowrap; }
.hm-th-comp { text-align: left; }
.hm-comp  { font-size: 10px; color: var(--text2); padding: 4px 8px 4px 0; white-space: nowrap; text-align: left; max-width: 220px; }
.hm-cell  { text-align: center; padding: 5px 8px; border-radius: 4px; font-weight: 600; font-size: 10px; color: var(--text); min-width: 56px; cursor: default; transition: opacity .15s; }
.hm-cell:hover { opacity: .75; }
.hm-scale { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.hm-scale-lbl { font-size: 9px; color: var(--text3); white-space: nowrap; }
.hm-scale-bar { flex: 1; height: 6px; border-radius: 3px; background: linear-gradient(to right, rgba(63,185,80,.4), rgba(239,159,39,.7), rgba(226,75,74,.9)); }
.hm-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.hm-leg-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text2); }
.hm-leg-dot  { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="gdb-error"></div>

<div class="gdb-page" id="main-content" style="display:none">
<div class="issue-content">

  <!-- KPI row -->
  <div class="kpi-grid" id="issue-kpi" style="margin-bottom:14px;grid-template-columns:repeat(7,1fr)"></div>

  <!-- Charts row -->
  <div class="chart-grid" style="margin-bottom:14px">
    <div class="chart-card" id="chart-status"></div>
    <div class="chart-card" id="chart-priority"></div>
  </div>

  <!-- Issues panel -->
  <div class="panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">◆ Issues &amp; Incidents</div>
        <div class="panel-sub">Live issue tracking across all platforms — synced from Jira</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="view-btn active" id="view-btn-board" onclick="switchView('board')">Board</button>
        <button class="view-btn" id="view-btn-table" onclick="switchView('table')">Table</button>
      </div>
    </div>
    <div class="panel-body">

      <!-- Control bar -->
      <div class="ctrl-bar">
        <button class="status-btn active" data-status="all" onclick="onStatusFilter('all')">All</button>
        <button class="status-btn" data-status="Open" onclick="onStatusFilter('Open')">Open</button>
        <button class="status-btn" data-status="Investigating" onclick="onStatusFilter('Investigating')">Investigating</button>
        <button class="status-btn" data-status="In Progress" onclick="onStatusFilter('In Progress')">In Progress</button>
        <button class="status-btn" data-status="Resolved" onclick="onStatusFilter('Resolved')">Resolved</button>
        <button class="status-btn" data-status="Done" onclick="onStatusFilter('Done')">Done</button>
        <div class="ctrl-sep"></div>
        <select class="ctrl-select" id="filter-priority" onchange="onDropdownChange()">
          <option value="all">All priority</option>
        </select>
        <select class="ctrl-select" id="filter-severity" onchange="onDropdownChange()">
          <option value="all">All severity</option>
        </select>
        <select class="ctrl-select" id="filter-component" onchange="onDropdownChange()">
          <option value="all">All components</option>
        </select>
        <select class="ctrl-select" id="filter-group" onchange="onDropdownChange()">
          <option value="all">All support groups</option>
        </select>
        <div class="ctrl-sep"></div>
        <div class="ctrl-search">
          <input type="text" id="issue-search" placeholder="Search…" oninput="applyFilters()">
        </div>
        <span class="count-label" id="count-label"></span>
      </div>

      <!-- Board view -->
      <div id="board-view-wrap">
        <div class="iboard-wrap">
          <div class="iboard" id="issue-board"></div>
        </div>
      </div>

      <!-- Table view -->
      <div id="table-view-wrap" style="display:none">
        <div class="tbl-scroll">
          <table class="itbl">
            <thead><tr>
              <th onclick="sortIssueBy('Key')" style="white-space:nowrap;text-align:left">Key</th>
              <th onclick="sortIssueBy('Summary')" style="text-align:left">Summary</th>
              <th onclick="sortIssueBy('Status')" style="text-align:left">Status</th>
              <th onclick="sortIssueBy('Priority')" style="white-space:nowrap;text-align:left">Priority</th>
              <th onclick="sortIssueBy('Severity')" style="white-space:nowrap;text-align:left">Severity</th>
              <th onclick="sortIssueBy('Assignee')" style="text-align:left">Assignee</th>
              <th onclick="sortIssueBy('Due')" style="white-space:nowrap;text-align:left">Due date</th>
            </tr></thead>
            <tbody id="issue-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div><!-- /panel -->



  <!-- Risk + Performance Heatmap side-by-side -->
  <div class="panel" style="margin-top:16px">
    <div class="panel-body" style="display:grid;grid-template-columns:1fr 1fr;gap:24px;min-width:0">
      <div id="chart-risk" style="min-width:0;overflow:hidden"></div>
      <div id="chart-perf" style="min-width:0;overflow:hidden"></div>
    </div>
  </div>

</div><!-- /issue-content -->
</div><!-- /main-content -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../js/issue/config.js"></script>
<script src="../js/header.js"></script>
<script src="../js/issue/data.js"></script>
<script src="../js/issue/render.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  /* ── Chart toggle: event delegation for week/month buttons ── */
  document.addEventListener('click', function(ev) {
    var btn = ev.target.closest('[data-cgrp]');
    if (btn) toggleChartGroup(btn.getAttribute('data-cgrp'));
  });

  /* ── Default theme: dark ── */
  if (!localStorage.getItem('gdb_theme')) {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('gdb_theme', 'dark');
  }

  buildGdbHeader({ showRefresh: true });
  gdbAuthGuard(function() {
    document.getElementById('main-content').style.display = 'block';
    initIssueBoard();
  });
});
</script>
</body>
</html>
