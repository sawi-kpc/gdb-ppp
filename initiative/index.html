<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Initiatives Dashboard — GDB Dashboard</title>
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/initiative.css">
</head>
<body>

<div id="gdb-error"></div>
<div id="gdb-loading"><div class="gdb-spinner"></div><div class="gdb-loading-text">Loading…</div></div>

<div id="init-content" style="display:none">
<div class="filter-bar" style="margin-top:16px">
    <span class="fb-label">Roadmap year:</span>
    <div id="yf-sum" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="metrics-strip" id="sum-metrics"></div>
  <div class="section">
    <div class="sec-title">Initiative timeline</div>
    <div class="tl-ctrl-row">
      <span class="tl-ctrl-label">Focus:</span>
      <select class="tl-ctrl-select" id="tl-start" onchange="renderSummary()"></select>
      <span style="font-size:11px;color:#aaa">to</span>
      <select class="tl-ctrl-select" id="tl-end" onchange="renderSummary()"></select>
      <div class="fb-sep"></div>
      <span class="tl-ctrl-label">Stage:</span>
      <div id="sum-stage-filter" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <div class="fb-sep"></div>
      <button class="fb-btn" id="btn-hide-nodate" onclick="toggleHideNoDate(this)">Hide no-date items</button>
      <div class="fb-sep"></div>
      <span class="tl-today-badge" id="today-badge">Today</span>
      <div class="tl-legend-row">
        <span class="tl-leg"><span class="tl-leg-dot" style="background:#85B7EB"></span>Planned</span>
        <span class="tl-leg"><span class="tl-leg-dot" style="background:#1D9E75"></span>Actual</span>
        <span class="tl-leg"><span class="tl-leg-dot" style="background:#E24B4A"></span>Delayed</span>
      </div>
    </div>
    <div class="tl-container"><div class="tl-inner" id="tl-inner"></div></div>
  </div>
</div>

<!-- TAB 1 INITIATIVES -->
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/header.js"></script>
<script src="../js/render.js"></script>
<script src="../js/data.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  buildGdbHeader({ showRefresh: true });
  gdbAuthGuard(function(user, auth) {
    loadData(function() {
      document.getElementById('gdb-loading').style.display = 'none';
      document.getElementById('init-content').style.display = 'block';
      renderSummary();
      
    });
  });
});
</script>
</body>
</html>
