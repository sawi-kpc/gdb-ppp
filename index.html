<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GDB Dashboard — Sign in</title>
<link rel="stylesheet" href="css/shared.css">
<style>body{padding-top:0;}</style>
<script>
/* Set default dark theme before render to avoid flash */
(function(){
  var theme = localStorage.getItem('gdb_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">GDB</div>
  <div class="auth-sub">King Power Digital Commerce Dashboard</div>
  <label class="auth-label" for="auth-email">Email</label>
  <input class="auth-input" type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
  <label class="auth-label" for="auth-password">Password</label>
  <input class="auth-input" type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
  <button class="auth-btn" id="auth-login-btn">Sign in</button>
  <span class="auth-error" id="auth-error"></span>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:'AIzaSyCaS5kLNbm5lSLRHd1rdr0sXRCS5lB_Rgc',
  authDomain:'gdb-dashboard-prod.firebaseapp.com',
  projectId:'gdb-dashboard-prod',
  storageBucket:'gdb-dashboard-prod.firebasestorage.app',
  messagingSenderId:'170622130981',
  appId:'1:170622130981:web:23302ed9a5ce4e82ac58cc'
});

var _auth = firebase.auth();

/* ── Safari ITP fix: wait for stable auth state ──────────────
   Safari fires onAuthStateChanged(null) then user — ignore null
────────────────────────────────────────────────────────────── */
_auth.onAuthStateChanged(function(user) {
  if (user) window.location.href = 'channel/';
  /* null = not logged in or Safari still loading — stay on login page */
});

function doLogin() {
  var email = document.getElementById('auth-email').value.trim();
  var pass  = document.getElementById('auth-password').value;
  var btn   = document.getElementById('auth-login-btn');
  var err   = document.getElementById('auth-error');
  if (!email || !pass) { err.textContent = 'Please enter email and password.'; return; }
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in\u2026';
  _auth.signInWithEmailAndPassword(email, pass)
    .then(function() { window.location.href = 'channel/'; })
    .catch(function(e) {
      var msg = 'Login failed. Check your credentials.';
      if (e.code === 'auth/user-not-found')    msg = 'Email not found.';
      if (e.code === 'auth/wrong-password')    msg = 'Incorrect password.';
      if (e.code === 'auth/invalid-credential') msg = 'Invalid email or password.';
      if (e.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
      err.textContent = msg; btn.disabled = false; btn.textContent = 'Sign in';
    });
}

document.getElementById('auth-login-btn').addEventListener('click', doLogin);
document.getElementById('auth-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
